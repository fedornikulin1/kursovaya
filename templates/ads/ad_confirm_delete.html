{% extends "base.html" %}

{% block title %}Удаление объявления — UniBoard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white py-3">
                <h4 class="mb-0">⚠️ Подтверждение удаления</h4>
            </div>
            <div class="card-body p-4 text-center">
                <p class="lead">Вы уверены, что хотите удалить объявление <br><strong>«{{ ad.title }}»</strong>?</p>
                <p class="text-muted">Это действие нельзя будет отменить.</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'ads:my_ads' %}" class="btn btn-outline-secondary px-4">
                            Отмена
                        </a>
                        <button type="submit" class="btn btn-danger px-4">
                            Удалить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
